name: trade_reconciler
description: Cross-platform financial reconciliation app to compare two CSV trade files.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  csv: ^6.0.0
  file_picker: ^8.0.0
  file_saver: ^0.2.12
  path_provider: ^2.1.2
  collection: ^1.18.0
  excel: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

